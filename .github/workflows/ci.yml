name: Mod CI
on: [push, pull_request]

jobs:
  save-start:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Install mod
        run: |
          rm -rf /opt/factorio/mods/factoryplanner
          mkdir -p /opt/factorio/mods
          cp -r $GITHUB_WORKSPACE/modfiles /opt/factorio/mods/factoryplanner

      - name: Load save
        run: |
          rm -f /tmp/test-map.zip

          /opt/factorio/bin/x64/factorio \
            --create /tmp/test-map.zip

          /opt/factorio/bin/x64/factorio \
            --benchmark /tmp/test-map.zip \
            --benchmark-ticks 1

          if grep -q "^Error" /opt/factorio/factorio-current.log; then
            echo "Error found in log!"
            cat /opt/factorio/factorio-current.log
            exit 1
          fi
